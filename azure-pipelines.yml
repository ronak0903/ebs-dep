trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'Azure-Connection-App' # Your working connection
  acrName: 'Demoapp1233'
  repositoryName: 'node-app'
  containerAppName: 'node-app'
  resourceGroupName: 'your-resource-group-name' # Remember to change this to your actual resource group name!
  imageTag: '$(Build.BuildId)'

stages:
- stage: BuildAndDeploy
  displayName: 'Build and Deploy to Container App'
  jobs:
  - job: Build
    displayName: 'Build, Push, and Deploy'
    steps:
    # 1. Log in, Build, and Push using Azure CLI
    - task: AzureCLI@2
      displayName: 'Build and Push Docker Image to ACR'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          # Log into your Azure Container Registry
          az acr login --name $(acrName)
          
          # Build and push the image directly using the Docker CLI on the runner
          docker build -t $(acrName).azurecr.io/$(repositoryName):$(imageTag) -t $(acrName).azurecr.io/$(repositoryName):latest .
          docker push $(acrName).azurecr.io/$(repositoryName):$(imageTag)
          docker push $(acrName).azurecr.io/$(repositoryName):latest

    # 2. Deploy the new image revision to your Container App
    - task: AzureContainerApps@1
      displayName: 'Deploy to Azure Container Apps'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        imageToDeploy: '$(acrName).azurecr.io/$(repositoryName):$(imageTag)'
        containerAppName: '$(containerAppName)'
        resourceGroup: '$(resourceGroupName)'
